# ?????????????????????????????????????????
#  HireIQ ? Application Configuration
# ?????????????????????????????????????????

# Server
server.port=8082

# PostgreSQL ? change username/password to match your local setup
spring.datasource.url=jdbc:postgresql://localhost:5432/hireiq_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT ? IMPORTANT: change this secret to any long random string (min 32 chars)
app.jwt.secret=hireiq_super_secret_key_change_this_in_production_2024
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.hireiq=DEBUG
# Uncomment the line below to trace Spring Security decisions (remove after fixing 403)
# logging.level.org.springframework.security=DEBUG

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.disable-swagger-default-url=true

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dhxvzmdlf}
cloudinary.api-key=${CLOUDINARY_API_KEY:919216968514813}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your_cloudinary_api_secret}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ?? Spring AI + Groq ???????????????????????????????????????????
# 1. Go to console.groq.com ? sign up free ? API Keys ? Create key
# 2. Paste your key below
spring.ai.openai.api-key=${GROQ_API_KEY:your_groq_api_key}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.embedding.options.model=nomic-embed-text-v1.5

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:anusha.c1807@gmail.com}
spring.mail.password=${GMAIL_PASSWORD:your_gmail_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.from=${GMAIL_USERNAME:anusha.c1807@gmail.com}

# Activation Config
app.base.url=http://localhost:8082